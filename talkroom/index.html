<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>toocRoom</title>
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    
    <section class="inputarea">
        <div class="area_more area_vec wip">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 5l0 14" /><path d="M5 12l14 0" /></svg>
        </div>
        <label for="area_add-image" class="area_add-image area_vec">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15 8h.01" /><path d="M3 6a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v12a3 3 0 0 1 -3 3h-12a3 3 0 0 1 -3 -3v-12" /><path d="M3 16l5 -5c.928 -.893 2.072 -.893 3 0l5 5" /><path d="M14 14l1 -1c.928 -.893 2.072 -.893 3 0l3 3" /></svg>
            <input type="file" id="area_add-image" accept="image/*" style="display: none;">
        </label>
        <label for="area_input" class="area_input">
            <textarea id="area_input" rows="1" placeholder="メッセージを入力"></textarea>
        </label>
        <div id="area_action_btn" class="area_voicemessage area_vec wip">
            <div class="icon_wrapper mic_icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 5a3 3 0 0 1 3 -3a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3a3 3 0 0 1 -3 -3l0 -5" /><path d="M5 10a7 7 0 0 0 14 0" /><path d="M8 21l8 0" /><path d="M12 17l0 4" stroke-linecap="square" stroke-linejoin="square"/></svg>
            </div>
            <div class="icon_wrapper send_icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M10 14l11 -11" /><path d="M21 3l-6.5 18a.55 .55 0 0 1 -1 0l-3.5 -7l-7 -3.5a.55 .55 0 0 1 0 -1l18 -6.5" /></svg>
            </div>
        </div>

        <div class="area_morecontainer">
            <label for="more_files" class="more_item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2" /><path d="M11 14h1v4h1" /><path d="M12 11h.01" /></svg>
                <p>ファイル</p>
                <input type="file" id="more_files" style="display: none;">
            </label>
            <div class="more_item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M9 11a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /><path d="M17.657 16.657l-4.243 4.243a2 2 0 0 1 -2.827 0l-4.244 -4.243a8 8 0 1 1 11.314 0" /></svg>
                <p>場所</p>
            </div>
            <div class="more_item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M9 12l2 2l4 -4" /><path d="M12 3c7.2 0 9 1.8 9 9c0 7.2 -1.8 9 -9 9c-7.2 0 -9 -1.8 -9 -9c0 -7.2 1.8 -9 9 -9" /></svg>
                <p>投票</p>
            </div>
            <div class="more_item">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"><path d="M10.586 10.586l-1.586 -1.586" /><path d="M13.414 10.586l1.586 -1.586" /><path d="M13.414 13.414l1.586 1.586" /><path d="M10.586 13.414l-1.586 1.586" /><path d="M14 12a2 2 0 1 1 -4 0a2 2 0 0 1 4 0" /><path d="M16.5 4.206l-.5 .866" /><path d="M7.5 19.794l.5 -.866" /><path d="M19.794 7.5l-.866 .5" /><path d="M4.206 16.5l.866 -.5" /><path d="M7.5 4.206l.5 .866" /><path d="M16.5 19.794l-.5 -.866" /><path d="M4.206 7.5l.866 .5" /><path d="M19.794 16.5l-.866 -.5" /><path d="M12 3v1" /><path d="M12 21v-1" /><path d="M21 12h-1" /><path d="M3 12h1" /><path d="M12 21a9 9 0 1 1 0 -18a9 9 0 0 1 0 18" /></svg>
                <p>ルーレット</p>
            </div>
        </div>
    </section>

    <header>
        <div class="header_backlist header_vec" id="header_back_btn" style="cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15 6l-6 6l6 6" /></svg>
        </div>
        <div class="header_username" id="header_username">...</div>
        <div class="header_search header_vec wip">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 10a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
        </div>
        <div class="header_calling header_vec wip">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2" /></svg>
        </div>
        <div class="header_more header_vec wip">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4 6l16 0" /><path d="M4 12l16 0" /><path d="M4 18l16 0" /></svg>
        </div>
    </header>
    
    <main id="chat_main">
        <!-- メッセージがここに動的に追加されます -->
    </main>

    <div class="wip_container" id="wip">
        <div class="wip_box">
            <p class="headline">WIP</p>
            <p class="desc">未実装の機能です</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const wipTarget = document.getElementById('wip');
            if (!wipTarget) return;

            // Use event delegation or dynamic class check to only trigger WIP if the element currently has the .wip class
            document.querySelectorAll('.wip, #area_action_btn').forEach(function (button) {
                button.addEventListener('click', function () {
                    if (button.classList.contains('wip')) {
                        wipTarget.classList.add('active');
                    }
                });
            });

            wipTarget.addEventListener('click', function () {
                wipTarget.classList.remove('active');
            });

            // Logic to switch voice message and send button
            const areaInput = document.getElementById('area_input');
            const actionBtn = document.getElementById('area_action_btn');

            if (areaInput && actionBtn) {
                areaInput.addEventListener('input', function () {
                    const value = areaInput.value.trim();
                    if (value.length > 0) {
                        actionBtn.classList.remove('area_voicemessage', 'wip');
                        actionBtn.classList.add('area_send');
                    } else {
                        actionBtn.classList.remove('area_send');
                        actionBtn.classList.add('area_voicemessage', 'wip');
                    }
                });
            }
        });
    </script>
    <script type="module" src="../js/room.js"></script>
</body>
</html>
